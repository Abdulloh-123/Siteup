<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Siteup — Business Card · Print Ready</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Hanken+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* Card trim 88 x 51 mm, 3mm bleed each side -> 94 x 57 mm artboard.
     One card face per page. Crop marks sit in the bleed margin. */
  :root { --trim-w: 88mm; --trim-h: 51mm; --bleed: 3mm; --art-w: 94mm; --art-h: 57mm; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #6b6b66; -webkit-font-smoothing: antialiased; }
  .sheet {
    width: var(--art-w); height: var(--art-h);
    margin: 14mm auto; position: relative;
    background: #fff; /* bleed background filled per face below */
    box-shadow: 0 6px 24px rgba(0,0,0,0.3);
    page-break-after: always; overflow: hidden;
  }
  /* bleed fill = same as face bg so color runs to the cut */
  .sheet.cream { background: #f3efe6; }
  .sheet.ink { background: #1a1714; }

  /* the trimmed area, centered in the artboard */
  .bleedbox { position: absolute; inset: var(--bleed); overflow: hidden; }

  /* crop marks */
  .crop { position: absolute; width: 3mm; height: 3mm; pointer-events: none; }
  .crop::before, .crop::after { content: ""; position: absolute; background: rgba(0,0,0,0.55); }
  .sheet.ink .crop::before, .sheet.ink .crop::after { background: rgba(255,255,255,0.6); }
  .crop.v::before { width: 0.3mm; height: 3mm; } /* vertical tick */
  .crop.h::after { height: 0.3mm; width: 3mm; }  /* horizontal tick */
  .crop.tl { top: 0; left: 0; } .crop.tl::before { left: 0; top: -3mm; } .crop.tl::after { top: 0; left: -3mm; }
  .crop.tr { top: 0; right: 0; } .crop.tr::before { right: 0; top: -3mm; } .crop.tr::after { top: 0; right: -3mm; }
  .crop.bl { bottom: 0; left: 0; } .crop.bl::before { left: 0; bottom: -3mm; } .crop.bl::after { bottom: 0; left: -3mm; }
  .crop.br { bottom: 0; right: 0; } .crop.br::before { right: 0; bottom: -3mm; } .crop.br::after { bottom: 0; right: -3mm; }

  svg { display: block; }

  /* ---------- FRONT (cream) ---------- */
  .front { width: 100%; height: 51mm; color: #1a1714; padding: 6.5mm 7mm; display: flex; flex-direction: column; justify-content: space-between; position: relative; background: #f3efe6; }
  .front::before { content: ""; position: absolute; inset: 0; background-image: linear-gradient(rgba(26,23,20,0.045) 1px, transparent 1px), linear-gradient(90deg, rgba(26,23,20,0.045) 1px, transparent 1px); background-size: 6mm 6mm; -webkit-mask-image: radial-gradient(60mm 40mm at 100% 0%, #000 10%, transparent 72%); mask-image: radial-gradient(60mm 40mm at 100% 0%, #000 10%, transparent 72%); pointer-events: none; }
  .front .giant { position: absolute; right: -4mm; bottom: -12mm; font-family: 'Newsreader', serif; font-style: italic; font-weight: 500; font-size: 54mm; line-height: 1; color: rgba(26,23,20,0.06); pointer-events: none; z-index: 0; }
  .front .top { display: flex; align-items: center; gap: 2mm; position: relative; }
  .front .top .wm { font-family: 'Newsreader', serif; font-weight: 500; font-size: 5.4mm; letter-spacing: -0.01em; }
  .front .top .wm .dot { color: #c9482e; }
  .front .who { position: relative; }
  .front .name { font-family: 'Newsreader', serif; font-weight: 500; font-size: 6.6mm; letter-spacing: -0.01em; line-height: 1.05; }
  .front .role { font-family: 'IBM Plex Mono', monospace; font-size: 2.2mm; letter-spacing: 0.14em; text-transform: uppercase; color: #c9482e; margin-top: 2mm; }
  .front .role .sep { color: #b3a99a; margin: 0 1.2mm; }

  /* ---------- BACK (ink) ---------- */
  .back { width: 100%; height: 51mm; color: #fbf6ee; padding: 6.5mm 7mm; display: flex; flex-direction: column; justify-content: space-between; position: relative; background: #1a1714; }
  .back::before { content: ""; position: absolute; inset: 0; background: radial-gradient(60mm 40mm at 8% 100%, rgba(201,72,46,0.16), transparent 66%), radial-gradient(56mm 38mm at 100% 8%, rgba(20,86,75,0.18), transparent 64%); pointer-events: none; }
  .back .tagline { font-family: 'Newsreader', serif; font-style: italic; font-weight: 500; font-size: 3.9mm; color: #fbf6ee; position: relative; line-height: 1.25; }
  .back .tagline .pine { color: #7fd9c0; }
  .back .contact { position: relative; display: grid; gap: 1.6mm; }
  .back .contact a, .back .contact div { font-family: 'IBM Plex Mono', monospace; font-size: 2.5mm; letter-spacing: 0.03em; color: #e8e0d4; text-decoration: none; display: flex; align-items: center; gap: 2.2mm; white-space: nowrap; }
  .back .contact .k { color: #c9482e; width: 3mm; }

  @media print {
    html, body { background: #fff; }
    .sheet { margin: 0 auto; box-shadow: none; }
    @page { size: 94mm 57mm; margin: 0; }
  }
</style>
</head>
<body>

  <!-- PAGE 1 — FRONT -->
  <div class="sheet cream">
    <span class="crop v h tl"></span><span class="crop v h tr"></span><span class="crop v h bl"></span><span class="crop v h br"></span>
    <div class="bleedbox">
      <div class="front">
        <span class="giant">S</span>
        <div class="top">
          <svg width="6.4mm" height="5.8mm" viewBox="0 0 132 120" aria-hidden="true">
            <path d="M34 30 L22 30 L22 90 L34 90" fill="none" stroke="#c9482e" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M106 30 L118 30 L118 90 L106 90" fill="none" stroke="#c9482e" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
            <text x="44" y="90" font-family="Newsreader, serif" font-size="86" font-style="italic" font-weight="500" fill="#1a1714">S</text>
          </svg>
          <span class="wm">Siteup<span class="dot">.</span></span>
        </div>
        <div class="who">
          <div class="name">Tom Kodirov</div>
          <div class="role">Founder<span class="sep">/</span>Lead Developer</div>
        </div>
      </div>
    </div>
  </div>

  <!-- PAGE 2 — BACK -->
  <div class="sheet ink">
    <span class="crop v h tl"></span><span class="crop v h tr"></span><span class="crop v h bl"></span><span class="crop v h br"></span>
    <div class="bleedbox">
      <div class="back">
        <div>
          <svg width="10mm" height="9mm" viewBox="0 0 132 120" aria-label="Siteup mark" style="margin-bottom:3mm">
            <path d="M34 30 L22 30 L22 90 L34 90" fill="none" stroke="#c9482e" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M106 30 L118 30 L118 90 L106 90" fill="none" stroke="#c9482e" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
            <text x="44" y="90" font-family="Newsreader, serif" font-size="86" font-style="italic" font-weight="500" fill="#fbf6ee">S</text>
          </svg>
          <p class="tagline">Websites and digital systems that get<br>local business online — and <span class="pine">growing</span>.</p>
        </div>
        <div class="contact">
          <a href="https://www.siteup.com.au"><span class="k">↗</span>www.siteup.com.au</a>
          <a href="mailto:admin@siteup.com.au"><span class="k">@</span>admin@siteup.com.au</a>
          <div><span class="k">☎</span>+61 405 512 447</div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
